name: Apply site visual touch-up

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-site-touchup.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-touchup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Apply shared styles and navigation polish
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          files = [
              Path('index.html'),
              Path('clima/index.html'),
              Path('movilidad/index.html'),
              Path('supermercados/index.html'),
              Path('links/index.html'),
              Path('apps/index.html'),
          ]

          old_base = 'https://jrrguille-bit.github.io/jona-logistica-mapa/'
          new_base = 'https://jrrguille-bit.github.io/jona-logistica/'
          home_link = '''<a class="home-link" href="../" aria-label="Volver al inicio"><span class="home-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"></path><path d="M8 12h10"></path></svg></span><span>Inicio</span></a>'''
          home_pattern = re.compile(r'<a class="home-link" href="\.\./" aria-label="Volver al inicio">.*?</a>', re.S)

          for path in files:
              text = path.read_text(encoding='utf-8')
              text = text.replace(old_base, new_base)

              css_href = 'site-touchup.css?v=20260723-1' if path == Path('index.html') else '../site-touchup.css?v=20260723-1'
              css_tag = f'<link rel="stylesheet" href="{css_href}">'
              if 'site-touchup.css' not in text:
                  text = text.replace('</head>', css_tag + '\n</head>', 1)

              if path != Path('index.html'):
                  text, replacements = home_pattern.subn(home_link, text, count=1)
                  if replacements != 1:
                      raise RuntimeError(f'Could not normalize home link in {path}')

              path.write_text(text, encoding='utf-8')
          PY

      - name: Publish changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html clima/index.html movilidad/index.html supermercados/index.html links/index.html apps/index.html
          git commit -m "Polish site visuals and icon system"
          git push
