name: Update weather data

on:
  push:
    branches:
      - main
    paths:
      - "scripts/update_weather.py"
      - "scripts/update_weather_plan.py"
      - ".github/workflows/update-weather.yml"
  schedule:
    - cron: "17 * * * *"
      timezone: "America/Montevideo"
    - cron: "43 0,6,12,18 * * *"
      timezone: "America/Montevideo"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weather-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect weather sources
        run: python scripts/update_weather_plan.py

      - name: Save updated data
        run: |
          if git diff --quiet -- data/weather.json; then
            echo "No weather changes to save."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weather.json
          git commit -m "Update weather data"
          git pull --rebase origin main
          git push origin HEAD:main