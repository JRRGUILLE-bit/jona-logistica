name: Fix Logistica title accent

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-logistica-accent.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace the floating accented glyph
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              'h1 span{display:block}',
              'h1 > span{display:block}'
          )

          old_css = '''h1 strong{
  display:block;
  font-weight:400;
  letter-spacing:.18em;
  margin-right:-.18em;
  color:#e9e5de;
}'''
          new_css = '''h1 strong{
  display:block;
  font-weight:400;
  letter-spacing:.18em;
  margin-right:-.18em;
  color:#e9e5de;
}
.accented-i{
  position:relative;
  display:inline-block;
}
.accented-i:before{
  content:"";
  position:absolute;
  left:50%;
  top:-.08em;
  width:.075em;
  height:.27em;
  border-radius:999px;
  background:currentColor;
  transform:translate(-5%,-100%) rotate(25deg);
  transform-origin:center bottom;
}'''
          text = text.replace(old_css, new_css)

          text = text.replace(
              '<h1 id="page-title"><span>Jona</span><strong>Logística</strong></h1>',
              '<h1 id="page-title"><span>Jona</span><strong aria-label="Logística">LOG<span class="accented-i" aria-hidden="true">I</span>STICA</strong></h1>'
          )

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit title correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes required."
            exit 0
          fi
          git commit -m "Refine Logistica title accent"
          git push