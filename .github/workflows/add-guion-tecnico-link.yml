name: Add guion tecnico link

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/add-guion-tecnico-link.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add guion tecnico card
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('links/index.html')
          html = path.read_text(encoding='utf-8')

          html = html.replace('aria-label="Seis documentos disponibles"', 'aria-label="Siete documentos disponibles"')
          html = html.replace('<strong>6</strong>\n        <span>Accesos directos</span>', '<strong>7</strong>\n        <span>Accesos directos</span>')

          marker = 'https://docs.google.com/spreadsheets/d/1gX1jZB8dDDLredElCxHmNVKExktuTB5qf5nzVUCo5U8/edit?usp=drive_link'
          if marker not in html:
              needle = '''      <a class="link-card sheet" href="https://docs.google.com/spreadsheets/d/1YecQX-C6c6acIv_-rPKAzYUpezzngsgB8IYx-5iq-RY/edit?usp=sharing" target="_blank" rel="noopener noreferrer">'''
              card = '''      <a class="link-card sheet" href="https://docs.google.com/spreadsheets/d/1gX1jZB8dDDLredElCxHmNVKExktuTB5qf5nzVUCo5U8/edit?usp=drive_link" target="_blank" rel="noopener noreferrer">
        <span class="link-icon" aria-hidden="true"><svg viewBox="0 0 32 32"><rect x="5" y="6" width="22" height="21" rx="2"></rect><path d="M5 12h22M11 12v15M20 12v15M11 18h16M11 23h16"></path></svg></span>
        <span class="link-copy"><span class="file-type">Planilla</span><strong>Guion técnico</strong><span>Desglose técnico de planos, cámara y necesidades de rodaje.</span></span>
        <span class="external" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M14 5h5v5M19 5l-9 9"></path><path d="M19 13v6H5V5h6"></path></svg></span>
      </a>

'''
              if needle not in html:
                  raise SystemExit('No se encontró el punto de inserción del guion técnico')
              html = html.replace(needle, card + needle, 1)

          path.write_text(html, encoding='utf-8')
          PY
      - name: Commit link
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add links/index.html
          git commit -m "Add guion tecnico production link"
          git push
