name: Install site favicons

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/install-favicon.yml

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add favicon links to every HTML page
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          for path in Path('.').rglob('*.html'):
              text = path.read_text(encoding='utf-8')
              if 'favicon.ico' in text:
                  continue

              depth = len(path.relative_to('.').parts) - 1
              prefix = '../' * depth
              links = (
                  f'<link rel="icon" href="{prefix}favicon.ico" sizes="any">\n'
                  f'<link rel="icon" type="image/png" sizes="32x32" href="{prefix}favicon-32x32.png">\n'
                  f'<link rel="icon" type="image/png" sizes="16x16" href="{prefix}favicon-16x16.png">\n'
                  f'<link rel="apple-touch-icon" sizes="180x180" href="{prefix}apple-touch-icon.png">\n'
                  f'<link rel="icon" type="image/png" sizes="192x192" href="{prefix}android-chrome-192x192.png">'
              )

              theme = re.search(r'(<meta\s+name=["\']theme-color["\'][^>]*>)', text, flags=re.I)
              if theme:
                  pos = theme.end()
                  text = text[:pos] + '\n' + links + text[pos:]
              else:
                  text = text.replace('</head>', links + '\n</head>', 1)

              path.write_text(text, encoding='utf-8')
              print(f'updated {path}')
          PY

      - name: Commit favicon integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          if git diff --cached --quiet; then
            echo "No HTML changes required."
            exit 0
          fi
          git commit -m "Connect favicon across site pages"
          git push
