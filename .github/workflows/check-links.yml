name: Check links

on:
  push:
    branches:
      - main
    paths:
      - "**/*.html"
      - "**/*.md"
      - "**/*.css"
      - "**/*.js"
      - "assets/**"
      - "apps/downloads/**"
      - ".lycheeignore"
      - ".github/workflows/check-links.yml"
  pull_request:
    paths:
      - "**/*.html"
      - "**/*.md"
      - "**/*.css"
      - "**/*.js"
      - "assets/**"
      - "apps/downloads/**"
      - ".lycheeignore"
      - ".github/workflows/check-links.yml"
  schedule:
    - cron: "20 12 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  internal-links:
    name: Internal links and anchors
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check internal links, files and anchors
        uses: lycheeverse/lychee-action@v2.9.0
        with:
          args: >-
            --offline
            --include-fragments
            --root-dir "${{ github.workspace }}"
            --verbose
            --no-progress
            './**/*.md'
            './**/*.html'
          fail: true
          failIfEmpty: true
          format: markdown
          jobSummary: true
          output: lychee/internal-links.md

  external-links:
    name: External links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Restore link-check cache
        id: restore-cache
        uses: actions/cache/restore@v4
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Check external links
        uses: lycheeverse/lychee-action@v2.9.0
        with:
          args: >-
            --root-dir "${{ github.workspace }}"
            --cache
            --max-cache-age 1d
            --cache-exclude-status '429,500..=599'
            --max-retries 3
            --retry-wait-time 2
            --timeout 25
            --max-concurrency 12
            --accept '200,204,206,429'
            --exclude-all-private
            --verbose
            --no-progress
            './**/*.md'
            './**/*.html'
          fail: true
          failIfEmpty: true
          format: markdown
          jobSummary: true
          output: lychee/external-links.md

      - name: Save link-check cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .lycheecache
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}
