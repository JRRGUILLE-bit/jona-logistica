name: Publish MENELAO downloads

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-menelao-downloads.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-downloads:
    runs-on: ubuntu-latest
    steps:
      - name: Check out production site
        uses: actions/checkout@v4

      - name: Download MENELAO packages
        env:
          WINDOWS_URL: "https://sdmntprbrazilsouth.oaiusercontent.com/files/00000000-bfb4-820e-94e6-1b627c82b819/raw?se=2026-07-23T08:52:32Z&sp=r&sv=2026-02-06&sr=b&scid=9f79772c-cb35-519f-9d55-52c491920fd9&skoid=33096a49-a96b-4506-9fc4-04a7517f8175&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-22T21:17:08Z&ske=2026-07-24T21:17:08Z&sks=b&skv=2026-02-06&sig=Enomh40IByTCBgEqoXk0Obr39eIeaRthZBDsefI6dgE%3D"
          LINUX_URL: "https://sdmntprbrazilsouth.oaiusercontent.com/files/00000000-7810-820e-8afd-b11c748acd15/raw?se=2026-07-23T08:52:41Z&sp=r&sv=2026-02-06&sr=b&scid=ad478f68-b529-5bb8-ab99-ebde72082172&skoid=33096a49-a96b-4506-9fc4-04a7517f8175&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-22T21:19:21Z&ske=2026-07-24T21:19:21Z&sks=b&skv=2026-02-06&sig=1WowThNCjnVq1p/zXLsLNAtfUVjnmdBBgvFSErO/wBM%3D"
        run: |
          mkdir -p apps/downloads
          curl --fail --location --retry 3 "$WINDOWS_URL" --output apps/downloads/MENELAO-windows-x86_64.zip
          curl --fail --location --retry 3 "$LINUX_URL" --output apps/downloads/MENELAO-linux-x86_64.zip
          test "$(stat -c%s apps/downloads/MENELAO-windows-x86_64.zip)" -gt 10000000
          test "$(stat -c%s apps/downloads/MENELAO-linux-x86_64.zip)" -gt 20000000

      - name: Publish files in the site repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/downloads/MENELAO-windows-x86_64.zip apps/downloads/MENELAO-linux-x86_64.zip
          git commit -m "Publish public MENELAO downloads"
          git push
