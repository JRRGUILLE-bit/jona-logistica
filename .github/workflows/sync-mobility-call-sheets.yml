name: Sync mobility call sheets

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sync-mobility-call-sheets.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply current locations and crew call times
        run: |
          python - <<'PY'
          from pathlib import Path

          mobility = Path("movilidad/index.html")
          text = mobility.read_text(encoding="utf-8")

          css = '.day-schedule{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:0 0 14px}.schedule-stop{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:13px;min-height:72px;padding:12px 14px;border:1px solid var(--hair);border-radius:12px;background:linear-gradient(145deg,rgba(6,25,38,.84),rgba(7,32,47,.68));text-decoration:none;box-shadow:0 10px 28px rgba(0,0,0,.24);backdrop-filter:blur(13px);-webkit-backdrop-filter:blur(13px);transition:transform .18s ease,border-color .18s ease,background .18s ease}.schedule-stop:hover{transform:translateY(-2px);border-color:var(--line);background:linear-gradient(145deg,rgba(8,31,46,.94),rgba(9,38,55,.82))}.schedule-time{min-width:54px;color:var(--accent);font-family:Oswald,Impact,sans-serif;font-size:22px;font-weight:500;letter-spacing:.04em}.schedule-stop strong{display:block;font-family:Oswald,Impact,sans-serif;font-size:18px;font-weight:500;letter-spacing:.03em;text-transform:uppercase}.schedule-stop small{display:block;margin-top:3px;color:var(--muted);font-size:11px;line-height:1.35}.schedule-stop b{color:var(--accent);font-family:Oswald,Impact,sans-serif;font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}.schedule-label{grid-column:1/-1;margin:0 2px -2px;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.11em;text-transform:uppercase}'
          if '.day-schedule{' not in text:
              text = text.replace('.cars{display:grid', css + '\n.cars{display:grid', 1)
          text = text.replace('.home-link:focus-visible,.day-link:focus-visible{', '.home-link:focus-visible,.day-link:focus-visible,.schedule-stop:focus-visible{')
          text = text.replace('.day-nav,.cars{grid-template-columns:1fr}', '.day-nav,.day-schedule,.cars{grid-template-columns:1fr}')

          day1_old = '<section class="day" id="dia-1" aria-labelledby="titulo-dia-1"><div class="day-heading"><div><p class="day-kicker">Día 1</p><h2 id="titulo-dia-1">Sábado 25 de julio</h2></div><p>Ciudad de la Costa · La Paz</p></div><div class="cars">'
          day1_new = '<section class="day" id="dia-1" aria-labelledby="titulo-dia-1"><div class="day-heading"><div><p class="day-kicker">Día 1</p><h2 id="titulo-dia-1">Sábado 25 de julio</h2></div><p>Taller · Ciudad de la Costa<br>Casa Negro · La Paz</p></div><div class="day-schedule" aria-label="Citaciones y locaciones del día 1"><p class="schedule-label">Citación del crew</p><a class="schedule-stop" href="https://maps.app.goo.gl/rCRmuXbNJsoWQdP96" target="_blank" rel="noopener"><span class="schedule-time">07:00</span><span><strong>Taller</strong><small>Acacias M36 S4 · Ciudad de la Costa</small></span><b>Maps ↗</b></a><a class="schedule-stop" href="https://maps.app.goo.gl/sYxF6PrtNMkBd42r7" target="_blank" rel="noopener"><span class="schedule-time">18:00</span><span><strong>Casa Negro</strong><small>6QQF+QMQ · La Paz</small></span><b>Maps ↗</b></a></div><div class="cars">'
          text = text.replace(day1_old, day1_new, 1)

          day2_old = '<section class="day" id="dia-2" aria-labelledby="titulo-dia-2"><div class="day-heading"><div><p class="day-kicker">Día 2</p><h2 id="titulo-dia-2">Domingo 26 de julio</h2></div><p>Plaza de la Ciudad de La Paz · Colina / Las Piedras</p></div><div class="cars">'
          day2_new = '<section class="day" id="dia-2" aria-labelledby="titulo-dia-2"><div class="day-heading"><div><p class="day-kicker">Día 2</p><h2 id="titulo-dia-2">Domingo 26 de julio</h2></div><p>Plaza de la Ciudad de La Paz<br>Colina · 18 de Mayo (zona Las Piedras)</p></div><div class="day-schedule" aria-label="Citaciones y locaciones del día 2"><p class="schedule-label">Citación y traslado del crew</p><a class="schedule-stop" href="https://maps.app.goo.gl/nd538q5WVMxNq2Wa6" target="_blank" rel="noopener"><span class="schedule-time">13:00</span><span><strong>Plaza La Paz</strong><small>Plaza de la Ciudad de La Paz</small></span><b>Maps ↗</b></a><a class="schedule-stop" href="https://maps.app.goo.gl/AjuynWbkmxZ57cQX6" target="_blank" rel="noopener"><span class="schedule-time">15:30</span><span><strong>Traslado a Colina</strong><small>7QG7+RXV · 18 de Mayo</small></span><b>Maps ↗</b></a></div><div class="cars">'
          text = text.replace(day2_old, day2_new, 1)

          text = text.replace('<strong>El Piojo</strong><span>Microfonista</span>', '<strong>El Piojo</strong><span>Microfonista · mañana únicamente</span>', 1)
          mobility.write_text(text, encoding="utf-8")

          replacements = {
              Path('scripts/update_weather_plan.py'): [('Auto y Casa Jona · La Paz', 'Plaza de la Ciudad de La Paz'), ('Casa Jona · La Paz', 'Plaza de la Ciudad de La Paz')],
              Path('scripts/update_weather.py'): [('Auto y Casa Jona · La Paz', 'Plaza de la Ciudad de La Paz'), ('Casa Jona · La Paz', 'Plaza de la Ciudad de La Paz')],
              Path('data/weather.json'): [('Auto y Casa Jona · La Paz', 'Plaza de la Ciudad de La Paz'), ('Casa Jona · La Paz', 'Plaza de la Ciudad de La Paz')],
          }
          for path, pairs in replacements.items():
              if path.exists():
                  value = path.read_text(encoding='utf-8')
                  for old, new in pairs:
                      value = value.replace(old, new)
                  path.write_text(value, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add movilidad/index.html scripts/update_weather.py scripts/update_weather_plan.py data/weather.json
          git commit -m "Sync mobility page with current call sheets"
          git pull --rebase origin main
          git push origin HEAD:main
