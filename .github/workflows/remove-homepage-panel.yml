name: Remove homepage panel effect

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/remove-homepage-panel.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove panel styling from homepage wrapper
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('site-touchup.css')
          css = path.read_text(encoding='utf-8')
          marker = '/* Portada sin panel envolvente */'
          block = '''

/* Portada sin panel envolvente */
.shell > .hero{
  border-radius:0!important;
  box-shadow:none!important;
}
.shell > .hero:before{
  content:none!important;
  display:none!important;
}
'''
          if marker not in css:
              path.write_text(css.rstrip() + block + '\n', encoding='utf-8')
          PY
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site-touchup.css
          git diff --cached --quiet && exit 0
          git commit -m "Remove homepage wrapper panel effect"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep 3
          done
          exit 1
