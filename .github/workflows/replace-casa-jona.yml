name: Replace Casa Jona with Plaza La Paz

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/replace-casa-jona.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update location name
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path("movilidad/index.html"): [
                  (
                      "<p>La Paz · Las Piedras</p>",
                      "<p>Plaza de la Ciudad de La Paz · Colina / Las Piedras</p>",
                  ),
              ],
              Path("scripts/update_weather_plan.py"): [
                  (
                      '"locations": "Auto y Casa Jona · La Paz · Colina · Las Piedras",',
                      '"locations": "Plaza de la Ciudad de La Paz · Colina · Las Piedras",',
                  ),
                  (
                      '"location": "Auto y Casa Jona · La Paz",',
                      '"location": "Plaza de la Ciudad de La Paz",',
                  ),
              ],
              Path("scripts/update_weather.py"): [
                  (
                      '"locations": "Auto y Casa Jona · La Paz · Colina · Las Piedras",',
                      '"locations": "Plaza de la Ciudad de La Paz · Colina · Las Piedras",',
                  ),
                  (
                      '"locations": "La Paz · Las Piedras",',
                      '"locations": "Plaza de la Ciudad de La Paz · Colina · Las Piedras",',
                  ),
                  (
                      '"location": "Auto y Casa Jona · La Paz",',
                      '"location": "Plaza de la Ciudad de La Paz",',
                  ),
                  (
                      '"location": "Casa Jona · La Paz",',
                      '"location": "Plaza de la Ciudad de La Paz",',
                  ),
              ],
              Path("data/weather.json"): [
                  ("Auto y Casa Jona · La Paz", "Plaza de la Ciudad de La Paz"),
                  ("Casa Jona · La Paz", "Plaza de la Ciudad de La Paz"),
              ],
          }

          changed = []
          for path, pairs in replacements.items():
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              updated = text
              for old, new in pairs:
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding="utf-8")
                  changed.append(str(path))

          print("Updated:", ", ".join(changed) if changed else "nothing")
          PY

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add movilidad/index.html scripts/update_weather.py scripts/update_weather_plan.py data/weather.json
          git commit -m "Use Plaza La Paz as day 2 location"
          git pull --rebase origin main
          git push origin HEAD:main
